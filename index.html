<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zonest Calculator</title>
  <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js" crossorigin="anonymous"></script>
  <style>
    :root[data-theme="dark"] {
      --bg:#0e0e12; --surface:#1a1a24; --surface2:#23232f; --border:#2e2e3e;
      --text:#e8e8f0; --muted:#6b6b88; --accent:#7c6af7; --accent2:#f76a8a;
      --disp:#111118; --btn:#1e1e2a; --btn-h:#2a2a3a;
      --op:#252535; --op-h:#30304a;
      --eq:linear-gradient(135deg,#7c6af7,#a56af7);
      --eq-h:linear-gradient(135deg,#8f7fff,#bf7fff);
      --cl:#2d1e30; --cl-h:#3d2a42; --cl-c:#f76a8a;
      --shadow:0 8px 40px rgba(0,0,0,.6);
      --hist:#14141e; --tog:#2e2e3e; --togk:#7c6af7;
      --ck:#1a1a2e; --ckb:#2e2e4a;
    }
    :root[data-theme="light"] {
      --bg:#f0eff7; --surface:#fff; --surface2:#f7f6ff; --border:#dddaf0;
      --text:#1a1a2e; --muted:#8888aa; --accent:#6a54f0; --accent2:#e83a62;
      --disp:#f5f4ff; --btn:#f0effe; --btn-h:#e3e1f7;
      --op:#ebe8ff; --op-h:#d9d5f7;
      --eq:linear-gradient(135deg,#6a54f0,#9a54f0);
      --eq-h:linear-gradient(135deg,#7b65f5,#ab65f5);
      --cl:#ffe8ef; --cl-h:#ffd4e0; --cl-c:#c42a52;
      --shadow:0 8px 40px rgba(90,80,180,.12);
      --hist:#f9f8ff; --tog:#dddaf0; --togk:#6a54f0;
      --ck:#fffff8; --ckb:#e0ddf5;
    }

    img.emoji {
       height: 1em;
       width: 1em;
       margin: 0 .05em 0 .1em;
       vertical-align: -0.1em;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    
    body{
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px 20px 120px;
      transition:background .3s,color .3s;
    }

    .topbar{width:100%;max-width:400px;display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .topbar-title{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
    
    .theme-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .theme-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:4px;}
    
    .toggle-track{width:40px;height:20px;background:var(--tog);border-radius:10px;position:relative;transition:background .3s}
    .toggle-knob{width:14px;height:14px;background:var(--togk);border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .3s;}
    [data-theme="light"] .toggle-knob{transform:translateX(20px)}

    .calc-card{width:100%;max-width:400px;background:var(--surface);border-radius:28px;border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:background .3s;}

    .display{background:var(--disp);padding:22px 24px 16px;border-bottom:1px solid var(--border);min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;}
    
    .hist-line, .main-expr, .main-result, .v-calc, .div-box {
      font-family: 'SFMono-Regular', Consolas, monospace;
    }

    .hist-line{font-size:12px;color:var(--muted);min-height:18px;text-align:right;margin-bottom:6px;overflow:hidden;}
    .main-expr{font-size:14px;color:var(--muted);min-height:20px;text-align:right;overflow:hidden;}
    .main-result{font-size:38px;font-weight:700;color:var(--text);text-align:right;overflow:hidden;line-height:1.15;transition:font-size .1s}

    .strip-btn{width:100%;background:none;border:none;border-bottom:1px solid var(--border);padding:10px 24px;font-family: inherit;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:6px;transition:color .2s;}
    .strip-btn:hover{color:var(--accent);}
    .strip-btn .arr{display:inline-block;transition:transform .3s}
    .strip-btn.open .arr{transform:rotate(180deg)}
    .strip-panel{background:var(--hist);border-bottom:1px solid var(--border);max-height:0;overflow:hidden;transition:max-height .35s ease;}
    .strip-panel.open{max-height:280px;overflow-y:auto}
    .strip-inner{padding:14px 24px}

    .hist-item{font-size:12px;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
    .hist-item span{color:var(--text);font-weight:700}

    .buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:18px}
    .btn{font-family: inherit;font-size:17px;font-weight:700;border:none;border-radius:14px;height:62px;cursor:pointer;transition:background .15s,transform .08s;outline:none}
    .btn:active{transform:scale(.95)}
    .btn-num{background:var(--btn);color:var(--text)}
    .btn-num:hover{background:var(--btn-h)}
    .btn-op{background:var(--op);color:var(--accent)}
    .btn-op:hover{background:var(--op-h)}
    .btn-cl{background:var(--cl);color:var(--cl-c)}
    .btn-eq{background:var(--eq);color:#fff;box-shadow:0 4px 15px rgba(124,106,247,.2)}
    .btn-zero{grid-column:span 2}

    /* Rodapé com Créditos */
    .footer-credits {
      margin-top: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      opacity: 0.8;
    }

    .cookie{position:fixed;bottom:0;left:0;right:0;background:var(--ck);border-top:1px solid var(--ckb);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:999;flex-wrap:wrap}
    .cookie-text{font-size:12px;color:var(--muted);flex:1;min-width:180px}
    .ck-btn{font-family: inherit;font-size:11px;font-weight:700;padding:8px 16px;border-radius:10px;border:none;cursor:pointer;}

    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
    .shake{animation:shake .3s ease-in-out}
  </style>
</head>
<body>

<div class="topbar">
  <span class="topbar-title">Zonest Calculator</span>
  <div class="theme-toggle" onclick="toggleTheme()">
    <span class="theme-label" id="theme-label">🌙 Escuro</span>
    <div class="toggle-track"><div class="toggle-knob"></div></div>
  </div>
</div>

<div class="calc-card" id="calc-card">
  <div class="display">
    <div class="hist-line" id="hist-line"></div>
    <div class="main-expr" id="main-expr"></div>
    <div class="main-result" id="main-result">0</div>
  </div>

  <button class="strip-btn" id="hist-btn" onclick="togglePanel('hist-panel','hist-btn')">
    <span class="arr">▼</span> Histórico
  </button>
  <div class="strip-panel" id="hist-panel">
    <div class="strip-inner" id="hist-inner">
      <div class="no-hist" id="no-hist" style="font-size: 11px; color: var(--muted); text-align: center;">Vazio</div>
    </div>
  </div>

  <button class="strip-btn" id="armed-btn" onclick="togglePanel('armed-panel','armed-btn')">
    <span class="arr">▼</span> Conta armada
  </button>
  <div class="strip-panel" id="armed-panel">
    <div class="strip-inner">
      <div id="armed-ph" style="font-size: 11px; color: var(--muted); text-align: center;">Nenhum cálculo recente.</div>
      <div id="armed-content"></div>
    </div>
  </div>

  <div class="buttons">
    <button class="btn btn-cl"  onclick="clearAll()">AC</button>
    <button class="btn btn-op"  style="color: var(--muted)" onclick="toggleSign()">+/-</button>
    <button class="btn btn-op"  style="color: var(--muted)" onclick="percent()">%</button>
    <button class="btn btn-op"  onclick="inputOp('÷')">÷</button>
    <button class="btn btn-num" onclick="inputNum('7')">7</button>
    <button class="btn btn-num" onclick="inputNum('8')">8</button>
    <button class="btn btn-num" onclick="inputNum('9')">9</button>
    <button class="btn btn-op"  onclick="inputOp('×')">×</button>
    <button class="btn btn-num" onclick="inputNum('4')">4</button>
    <button class="btn btn-num" onclick="inputNum('5')">5</button>
    <button class="btn btn-num" onclick="inputNum('6')">6</button>
    <button class="btn btn-op"  onclick="inputOp('−')">−</button>
    <button class="btn btn-num" onclick="inputNum('1')">1</button>
    <button class="btn btn-num" onclick="inputNum('2')">2</button>
    <button class="btn btn-num" onclick="inputNum('3')">3</button>
    <button class="btn btn-op"  onclick="inputOp('+')">+</button>
    <button class="btn btn-num btn-zero" onclick="inputNum('0')">0</button>
    <button class="btn btn-num" onclick="inputDecimal()">.</button>
    <button class="btn btn-eq"  onclick="calculate()">=</button>
  </div>
</div>

<div class="footer-credits">
  By: Derick
</div>

<div class="cookie" id="cookie">
  <div class="cookie-text">
    <span>🍪</span> <strong>Usamos cookies</strong> para melhorar sua experiência.
  </div>
  <div class="cookie-btns">
    <button class="ck-btn" style="background: var(--op); color: var(--accent)" onclick="closeCookie()">Recusar</button>
    <button class="ck-btn" style="background: var(--eq); color: #fff" onclick="closeCookie()">Aceitar</button>
  </div>
</div>

<script>
  function parseEmojis() {
    twemoji.parse(document.body, { folder: 'svg', ext: '.svg' });
  }

  window.onload = parseEmojis;

  function toggleTheme() {
    const root = document.documentElement;
    const isDark = root.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    root.setAttribute('data-theme', newTheme);
    document.getElementById('theme-label').innerHTML = newTheme === 'dark' ? '🌙 Escuro' : '☀️ Claro';
    parseEmojis();
  }

  function closeCookie() { document.getElementById('cookie').style.display = 'none'; }

  // Lógica da Calculadora
  var disp = '0', op1 = null, oper = null, justCalc = false;
  var histList = [];
  var resEl = document.getElementById('main-result');
  var exprEl = document.getElementById('main-expr');

  function fmt(n) {
    if (isNaN(n)) return 'Erro';
    let s = Number(n).toLocaleString('pt-BR', { maximumFractionDigits: 8 });
    return s.length > 12 ? Number(n).toExponential(5) : s;
  }

  function setResult(v) {
    resEl.textContent = v;
    resEl.style.fontSize = v.length > 10 ? '24px' : '38px';
  }

  function inputNum(n) {
    if (justCalc) { disp = n; justCalc = false; }
    else { disp = (disp === '0') ? n : disp + n; }
    setResult(disp);
  }

  function inputDecimal() {
    if (!disp.includes('.')) { disp += '.'; setResult(disp); }
  }

  function inputOp(op) {
    op1 = parseFloat(disp.replace(',','.'));
    oper = op;
    exprEl.textContent = fmt(op1) + ' ' + op;
    disp = '0';
  }

  function calculate() {
    if (oper === null) return;
    let b = parseFloat(disp.replace(',','.'));
    let res = 0;
    if (oper === '+') res = op1 + b;
    if (oper === '−') res = op1 - b;
    if (oper === '×') res = op1 * b;
    if (oper === '÷') {
      if (b === 0) {
        document.getElementById('calc-card').classList.add('shake');
        setTimeout(() => document.getElementById('calc-card').classList.remove('shake'), 300);
        setResult('Erro'); return;
      }
      res = op1 / b;
    }
    let rStr = fmt(res);
    exprEl.textContent = fmt(op1) + ' ' + oper + ' ' + fmt(b) + ' =';
    setResult(rStr);
    addHistory(fmt(op1), oper, fmt(b), rStr);
    disp = rStr;
    oper = null;
    justCalc = true;
  }

  function clearAll() {
    disp = '0'; op1 = null; oper = null; justCalc = false;
    setResult('0'); exprEl.textContent = '';
  }

  function addHistory(a, op, b, r) {
    histList.unshift({ text: `${a} ${op} ${b} = <span>${r}</span>` });
    const container = document.getElementById('hist-inner');
    document.getElementById('no-hist').style.display = 'none';
    const div = document.createElement('div');
    div.className = 'hist-item';
    div.innerHTML = histList[0].text;
    container.prepend(div);
  }

  function togglePanel(pid, bid) {
    document.getElementById(pid).classList.toggle('open');
    document.getElementById(bid).classList.toggle('open');
  }

  function toggleSign() { disp = (parseFloat(disp) * -1).toString(); setResult(disp); }
  function percent() { disp = (parseFloat(disp) / 100).toString(); setResult(disp); }
</script>

</body>
</html>
